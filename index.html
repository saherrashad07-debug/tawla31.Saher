<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>طاولة 31</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;600;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
<style>
:root{
  --frame:#3E2723;--frame-lt:#6D4C41;--surface:#4A5D23;--surface-dk:#3B4D1A;
  --pt-dk:#5D4037;--pt-lt:#C8B88A;--gold:#D4A017;--gold-lt:#F0C040;
  --w-chk:#FFF8E1;--w-chk-bdr:#C8B88A;--b-chk:#1A1A1A;--b-chk-hl:#555;
  --bar-bg:#2E1F12;--txt-lt:#F5E6C8;--txt-dk:#3E2723;
  --valid:#4CAF50;--combined:#2196F3;--danger:#E53935;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Cairo',sans-serif;background:linear-gradient(135deg,#1a1209 0%,#2c1e0f 50%,#1a1209 100%);color:var(--txt-lt);min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden;}
.screen{display:none;flex-direction:column;align-items:center;width:100%;padding:10px;}
.screen.active{display:flex;}

/* القائمة الرئيسية */
#mainMenu{justify-content:center;min-height:100vh;gap:20px;}
#mainMenu h1{font-size:clamp(2.5rem,7vw,4.5rem);font-weight:900;color:var(--gold);text-shadow:0 0 30px rgba(212,160,23,.4),0 4px 8px rgba(0,0,0,.6);letter-spacing:2px;font-family:'Amiri',serif;}
#mainMenu .subtitle{color:var(--txt-lt);opacity:.7;font-size:1rem;margin-bottom:20px;}
.menu-btn{background:linear-gradient(135deg,var(--frame),var(--frame-lt));border:2px solid var(--gold);color:var(--gold);padding:14px 36px;font-size:1.1rem;font-family:'Cairo',sans-serif;border-radius:12px;cursor:pointer;transition:all .3s;min-width:260px;text-align:center;}
.menu-btn:hover{background:linear-gradient(135deg,var(--gold),var(--gold-lt));color:var(--frame);transform:translateY(-2px);box-shadow:0 6px 20px rgba(212,160,23,.3);}
.menu-btn i{margin-left:8px;}
#onlineOpts{display:none;flex-direction:column;align-items:center;gap:10px;margin-top:10px;}
#onlineOpts input{background:var(--frame);border:1px solid var(--gold);color:var(--gold);padding:10px 16px;border-radius:8px;font-family:'Cairo',sans-serif;font-size:1rem;text-align:center;width:220px;}
#onlineOpts input::placeholder{color:var(--gold);opacity:.5;}
#roomCodeBox{display:none;background:var(--frame);border:2px solid var(--gold);border-radius:12px;padding:16px 24px;text-align:center;margin-top:8px;}
#roomCodeBox .code{font-size:2rem;font-weight:900;color:var(--gold-lt);letter-spacing:4px;font-family:'Cairo',monospace;}
#roomCodeBox .hint{font-size:.8rem;opacity:.6;margin-top:4px;}
.credit{position:fixed;bottom:8px;font-size:.7rem;opacity:.4;color:var(--txt-lt);}

/* المودال */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;justify-content:center;align-items:center;}
.modal-overlay.active{display:flex;}
.modal-box{background:linear-gradient(135deg,#2c1e0f,#3E2723);border:3px solid var(--gold);border-radius:20px;padding:32px 40px;text-align:center;max-width:460px;width:90%;box-shadow:0 0 60px rgba(212,160,23,.2);}
.modal-box h2{font-family:'Amiri',serif;color:var(--gold);font-size:1.8rem;margin-bottom:16px;}
.modal-box p{color:var(--txt-lt);margin:8px 0;font-size:1.05rem;}
.modal-btn{background:linear-gradient(135deg,var(--gold),var(--gold-lt));color:var(--frame);border:none;padding:14px 40px;font-size:1.15rem;font-weight:700;font-family:'Cairo',sans-serif;border-radius:12px;cursor:pointer;transition:all .3s;margin-top:16px;}
.modal-btn:hover{transform:scale(1.05);box-shadow:0 4px 20px rgba(212,160,23,.4);}
.modal-btn.secondary{background:var(--frame);color:var(--gold);border:2px solid var(--gold);}

/* زهر البداية */
.roll-display{display:flex;justify-content:center;gap:40px;margin:20px 0;}
.roll-player{display:flex;flex-direction:column;align-items:center;gap:8px;}
.roll-player .label{font-size:1rem;font-weight:600;}
.roll-player .die-face{width:70px;height:70px;background:var(--txt-lt);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:2.2rem;font-weight:900;color:var(--frame);box-shadow:0 4px 12px rgba(0,0,0,.4);transition:transform .3s;}
.roll-player .die-face.rolling{animation:diceShake .15s infinite alternate;}
@keyframes diceShake{0%{transform:rotate(-8deg) scale(1.05);}100%{transform:rotate(8deg) scale(.95);}}
#rollResult{font-size:1.3rem;font-weight:700;min-height:36px;color:var(--gold-lt);}

/* شاشة اللعب */
#gameScreen{gap:8px;padding-top:6px;}
.score-bar{display:flex;align-items:center;justify-content:center;gap:16px;font-size:1.15rem;font-weight:700;padding:6px 20px;background:rgba(62,39,35,.8);border:1px solid var(--gold);border-radius:30px;min-width:300px;}
.score-bar .vs{color:var(--gold);font-size:.9rem;}
.score-bar .white-score,.score-bar .black-score{display:flex;align-items:center;gap:6px;}
.score-bar .dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--gold);}
.score-bar .dot.w{background:var(--w-chk);}
.score-bar .dot.b{background:var(--b-chk);}
.player-bar{display:flex;justify-content:space-between;width:100%;max-width:960px;padding:0 4px;}
.player-info{display:flex;align-items:center;gap:8px;font-size:.95rem;font-weight:600;padding:4px 14px;border-radius:8px;border:1px solid transparent;transition:all .3s;}
.player-info.active-turn{border-color:var(--gold);box-shadow:0 0 12px rgba(212,160,23,.3);background:rgba(212,160,23,.1);}
.player-info .dot{width:12px;height:12px;border-radius:50%;}
.player-info .dot.w{background:var(--w-chk);border:1px solid var(--w-chk-bdr);}
.player-info .dot.b{background:var(--b-chk);}
.lock-badge{background:var(--danger);color:#fff;font-size:.7rem;padding:1px 8px;border-radius:10px;font-weight:700;animation:lockPulse 1.5s infinite;}
@keyframes lockPulse{0%,100%{opacity:1;}50%{opacity:.5;}}

/* الرقعة */
.board-frame{background:linear-gradient(135deg,#5D4037,#3E2723,#5D4037);padding:8px;border-radius:14px;box-shadow:0 8px 40px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.1);border:2px solid var(--frame-lt);position:relative;}
.board-inner{display:grid;grid-template-columns:repeat(6,1fr) 32px repeat(6,1fr) 52px;grid-template-rows:1fr 1fr;background:var(--surface);border-radius:8px;overflow:hidden;position:relative;height:clamp(320px,55vmin,480px);width:clamp(520px,88vmin,840px);}
.board-inner::before{content:'';position:absolute;inset:0;background:repeating-conic-gradient(rgba(0,0,0,.03) 0% 25%,transparent 0% 50%) 0 0/40px 40px;pointer-events:none;z-index:0;}

/* النقاط */
.point-cell{position:relative;display:flex;flex-direction:column;align-items:center;z-index:1;cursor:pointer;transition:background .2s;}
.point-cell:hover{background:rgba(255,255,255,.05);}
.point-cell.top{justify-content:flex-start;padding-top:2px;}
.point-cell.bottom{justify-content:flex-end;padding-bottom:2px;flex-direction:column-reverse;}
.triangle{width:100%;flex-shrink:0;}
.point-cell.top .triangle{height:75%;clip-path:polygon(5% 0%,95% 0%,50% 100%);}
.point-cell.bottom .triangle{height:75%;clip-path:polygon(50% 0%,95% 100%,5% 100%);}
.triangle.dark{background:var(--pt-dk);}
.triangle.light{background:var(--pt-lt);}
.point-num{font-size:.55rem;opacity:.5;position:absolute;color:var(--txt-lt);font-weight:600;}
.point-cell.top .point-num{bottom:1px;}
.point-cell.bottom .point-num{top:1px;}

/* الأحجار */
.checkers-stack{display:flex;flex-direction:column;align-items:center;position:absolute;z-index:2;}
.point-cell.top .checkers-stack{top:2px;flex-direction:column;}
.point-cell.bottom .checkers-stack{bottom:2px;flex-direction:column-reverse;}
.checker{width:clamp(24px,4.2vmin,36px);height:clamp(24px,4.2vmin,36px);border-radius:50%;margin:-3px 0;position:relative;transition:transform .15s,box-shadow .15s;flex-shrink:0;}
.checker.white{background:radial-gradient(circle at 35% 35%,#fff,var(--w-chk) 60%,#C8B88A);border:2px solid var(--w-chk-bdr);box-shadow:0 2px 4px rgba(0,0,0,.3);}
.checker.black{background:radial-gradient(circle at 35% 35%,#555,var(--b-chk) 60%,#000);border:2px solid #333;box-shadow:0 2px 4px rgba(0,0,0,.5);}
.checker.locked::after{content:'\f023';font-family:'Font Awesome 6 Free';font-weight:900;position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:.55rem;color:var(--danger);opacity:.8;}
.checker.selected{transform:scale(1.15);box-shadow:0 0 14px var(--gold)!important;z-index:10;}
.checker-count{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:.6rem;font-weight:900;pointer-events:none;}
.checker.white .checker-count{color:var(--frame);}
.checker.black .checker-count{color:var(--gold);}

/* التمييز */
.point-cell.valid-dest{background:rgba(76,175,80,.25);}
.point-cell.valid-dest::after{content:'';position:absolute;inset:4px;border:2px solid var(--valid);border-radius:8px;z-index:5;animation:destPulse 1s infinite;}
.point-cell.combined-dest{background:rgba(33,150,243,.2);}
.point-cell.combined-dest::after{content:'';position:absolute;inset:4px;border:2px solid var(--combined);border-radius:8px;z-index:5;animation:destPulse 1s infinite;}
@keyframes destPulse{0%,100%{opacity:1;}50%{opacity:.4;}}

/* البار */
.bar-cell{grid-column:7;grid-row:1/3;background:var(--bar-bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;z-index:2;position:relative;border-left:2px solid rgba(255,255,255,.08);border-right:2px solid rgba(255,255,255,.08);}
.bar-checker{width:clamp(22px,3.8vmin,32px);height:clamp(22px,3.8vmin,32px);border-radius:50%;}
.bar-checker.white{background:radial-gradient(circle at 35% 35%,#fff,var(--w-chk));border:2px solid var(--w-chk-bdr);}
.bar-checker.black{background:radial-gradient(circle at 35% 35%,#555,var(--b-chk));border:2px solid #333;}
.bar-label{font-size:.5rem;opacity:.4;color:var(--txt-lt);}

/* الصينية */
.bearoff-cell{grid-column:14;grid-row:1/3;background:rgba(30,15,5,.7);display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:8px 4px;z-index:2;border-right:2px solid rgba(255,255,255,.05);}
.bearoff-section{display:flex;flex-direction:column;align-items:center;gap:2px;}
.bearoff-section .label{font-size:.5rem;opacity:.5;}
.bearoff-count{font-size:1.4rem;font-weight:900;color:var(--gold);}
.bearoff-section.white-section .bearoff-count{color:var(--w-chk);}
.bearoff-section.black-section .bearoff-count{color:#aaa;}

/* الزهر */
.dice-area{display:flex;align-items:center;gap:12px;margin-top:6px;}
.die-box{width:52px;height:52px;background:linear-gradient(135deg,#fff,#e8e0d0);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.8rem;font-weight:900;color:var(--frame);box-shadow:0 3px 10px rgba(0,0,0,.4);border:2px solid #ccc;transition:all .3s;position:relative;}
.die-box.used{opacity:.3;transform:scale(.85);}
.die-box.rolling{animation:diceShake .12s infinite alternate;}
.roll-btn{background:linear-gradient(135deg,var(--gold),var(--gold-lt));color:var(--frame);border:none;padding:10px 28px;font-size:1rem;font-weight:700;font-family:'Cairo',sans-serif;border-radius:10px;cursor:pointer;transition:all .3s;}
.roll-btn:hover{transform:scale(1.05);box-shadow:0 4px 16px rgba(212,160,23,.4);}
.roll-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.turn-label{font-size:.9rem;font-weight:600;color:var(--gold);margin-top:4px;}
.moves-left{font-size:.8rem;opacity:.6;margin-top:2px;}

/* الكونفيتي */
#confettiCanvas{position:fixed;inset:0;z-index:2000;pointer-events:none;}

/* رسائل */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--frame);border:1px solid var(--gold);color:var(--gold);padding:10px 24px;border-radius:10px;font-weight:600;z-index:3000;animation:toastIn .3s;}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-20px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}

/* ريسبونسيف */
@media(max-width:600px){
  .board-inner{height:280px;width:98vw;}
  .checker{width:20px!important;height:20px!important;margin:-2px 0!important;}
  .modal-box{padding:20px 24px;}
  .score-bar{font-size:.95rem;min-width:auto;padding:4px 12px;}
}
</style>
</head>
<body>

<!-- القائمة الرئيسية -->
<div id="mainMenu" class="screen active">
  <h1>طاولة 31</h1>
  <p class="subtitle">اللي يجيب 31 نقطة الأول يكسب الماتش</p>
  <button class="menu-btn" onclick="startGame('local')"><i class="fas fa-users"></i> على نفس الجهاز</button>
  <button class="menu-btn" onclick="startGame('computer')"><i class="fas fa-robot"></i> ضد الكمبيوتر</button>
  <button class="menu-btn" onclick="toggleOnlineOpts()"><i class="fas fa-globe"></i> أونلاين</button>
  <div id="onlineOpts">
    <button class="menu-btn" onclick="createRoom()"><i class="fas fa-plus"></i> أنشئ غرفة</button>
    <div id="roomCodeBox"><div class="hint">كود الغرفة:</div><div class="code" id="roomCodeDisplay">---</div><div class="hint">انتظر الخصم...</div></div>
    <input id="joinCodeInput" placeholder="كود الغرفة">
    <button class="menu-btn" onclick="joinRoom()"><i class="fas fa-sign-in-alt"></i> انضم لغرفة</button>
  </div>
  <div class="credit">Created by Saher</div>
</div>

<!-- مودال رمي الزهر للبداية -->
<div id="rollModal" class="modal-overlay">
  <div class="modal-box">
    <h2>مين يبدأ؟</h2>
    <p>ارمي الزهر والأكبر يبدأ اللعب</p>
    <div class="roll-display">
      <div class="roll-player"><div class="label" style="color:var(--w-chk)">أبيض</div><div class="die-face" id="startDieW">?</div></div>
      <div class="roll-player"><div class="label" style="color:#aaa">أسود</div><div class="die-face" id="startDieB">?</div></div>
    </div>
    <div id="rollResult"></div>
    <button class="modal-btn" id="rollStartBtn" onclick="rollForStart()">ارمي الزهر</button>
  </div>
</div>

<!-- شاشة اللعب -->
<div id="gameScreen" class="screen">
  <div class="score-bar">
    <div class="white-score"><span class="dot w"></span> أبيض <span id="whiteScore">0</span>/31</div>
    <span class="vs">—</span>
    <div class="black-score"><span class="dot b"></span> أسود <span id="blackScore">0</span>/31</div>
  </div>
  <div class="player-bar">
    <div class="player-info" id="whiteInfo"><span class="dot w"></span> أبيض <span id="whiteLock" class="lock-badge" style="display:none">مقفل</span></div>
    <div class="player-info" id="blackInfo"><span class="dot b"></span> أسود <span id="blackLock" class="lock-badge" style="display:none">مقفل</span></div>
  </div>
  <div class="board-frame">
    <div class="board-inner" id="boardInner"></div>
  </div>
  <div class="dice-area">
    <div class="die-box" id="die1">?</div>
    <div class="die-box" id="die2">?</div>
    <button class="roll-btn" id="rollBtn" onclick="rollDiceForTurn()">ارمي الزهر</button>
  </div>
  <div class="turn-label" id="turnLabel"></div>
  <div class="moves-left" id="movesLeftLabel"></div>
</div>

<!-- مودال نهاية الجيم -->
<div id="gameEndModal" class="modal-overlay">
  <div class="modal-box">
    <h2 id="gameEndTitle"></h2>
    <p id="gameEndPoints"></p>
    <p id="gameEndTotal"></p>
    <button class="modal-btn" id="nextGameBtn" onclick="nextGame()">الجيم الجاي</button>
  </div>
</div>

<!-- مودال نهاية الماتش -->
<div id="matchEndModal" class="modal-overlay">
  <div class="modal-box">
    <h2 id="matchEndTitle" style="font-size:2.2rem;"></h2>
    <p id="matchEndMsg"></p>
    <button class="modal-btn" onclick="backToMenu()">العب تاني</button>
  </div>
</div>

<canvas id="confettiCanvas"></canvas>

<script>
/* ===== حالة اللعبة ===== */
let board = []; // board[0]=النقطة 1 ... board[23]=النقطة 24
let bar = {white:0, black:0};
let borneOff = {white:0, black:0};
let dice = [];
let movesLeft = [];
let currentPlayer = 'white';
let scores = {white:0, black:0};
let whiteUnlocked = false;
let blackUnlocked = false;
let gameMode = 'local';
let selectedPoint = -1;
let turnPhase = 'roll'; // roll, move
let gameOver = false;
let peer = null;
let conn = null;
let isHost = false;
let onlinePlayerColor = null;

/* ثوابت */
const DIR = {white:-1, black:1};
const START_PT = {white:23, black:0};
// منطقة فك القفل: النقاط 6-17 = الفهرس 5-16
function isUnlockedZone(idx){ return idx>=5 && idx<=16; }
function isLocked(player){ return player==='white'?!whiteUnlocked:!blackUnlocked; }
function isStartingPoint(idx,player){ return idx===START_PT[player]; }
function canBearOff(player){
  if(bar[player]>0) return false;
  let home = player==='white'?[0,1,2,3,4,5]:[18,19,20,21,22,23];
  for(let i=0;i<24;i++){
    if(board[i].color===player && board[i].count>0 && !home.includes(i)) return false;
  }
  return true;
}
function bearOffDist(player,idx){
  return player==='white'? idx+1 : 24-idx;
}
function isHighestChecker(player,idx){
  if(player==='white'){
    for(let i=idx+1;i<=5;i++) if(board[i].color===player&&board[i].count>0) return false;
    return true;
  } else {
    for(let i=idx-1;i>=18;i--) if(board[i].color===player&&board[i].count>0) return false;
    return true;
  }
}

/* ===== تهيئة ===== */
function initBoard(){
  board = Array.from({length:24},()=>({color:null,count:0}));
  board[23]={color:'white',count:15};
  board[0]={color:'black',count:15};
  bar={white:0,black:0};
  borneOff={white:0,black:0};
  whiteUnlocked=false;
  blackUnlocked=false;
  dice=[];
  movesLeft=[];
  selectedPoint=-1;
  turnPhase='roll';
  gameOver=false;
}

/* ===== بناء رقعة HTML ===== */
function buildBoard(){
  const el=document.getElementById('boardInner');
  el.innerHTML='';
  // ترتيب العرض: الصف الفوقي من اليمين لليسار: 13-18 | بار | 19-24
  // الصف السفلي: 12-7 | بار | 6-1
  const topIndices=[12,13,14,15,16,17,-1,18,19,20,21,22,23,-2];
  const bottomIndices=[11,10,9,8,7,6,-1,5,4,3,2,1,0,-2];
  // صف علوي
  for(let c=0;c<14;c++){
    let idx=topIndices[c];
    let div=document.createElement('div');
    if(idx===-1){
      div.className='bar-cell';
      div.id='barCell';
    } else if(idx===-2){
      div.className='bearoff-cell';
      div.innerHTML=`<div class="bearoff-section white-section"><div class="label">أبيض</div><div class="bearoff-count" id="boWhite">0</div></div><div class="bearoff-section black-section"><div class="label">أسود</div><div class="bearoff-count" id="boBlack">0</div></div>`;
    } else {
      let ptNum=idx+1;
      let isDark=idx%2===0;
      div.className='point-cell top';
      div.dataset.idx=idx;
      div.onclick=()=>handlePointClick(idx);
      div.innerHTML=`<div class="triangle ${isDark?'dark':'light'}"></div><div class="checkers-stack" id="cs${idx}"></div><div class="point-num">${ptNum}</div>`;
    }
    div.style.gridColumn=c+1;
    div.style.gridRow='1';
    el.appendChild(div);
  }
  // صف سفلي
  for(let c=0;c<14;c++){
    let idx=bottomIndices[c];
    let div=document.createElement('div');
    if(idx===-1){
      div.className='bar-cell';
    } else if(idx===-2){
      // الصينية موجودة فعلاً
      continue;
    } else {
      let ptNum=idx+1;
      let isDark=idx%2!==0;
      div.className='point-cell bottom';
      div.dataset.idx=idx;
      div.onclick=()=>handlePointClick(idx);
      div.innerHTML=`<div class="triangle ${isDark?'dark':'light'}"></div><div class="checkers-stack" id="cs${idx}"></div><div class="point-num">${ptNum}</div>`;
    }
    div.style.gridColumn=c+1;
    div.style.gridRow='2';
    el.appendChild(div);
  }
}

/* ===== تحديث عرض الرقعة ===== */
function renderBoard(){
  for(let i=0;i<24;i++){
    const stack=document.getElementById('cs'+i);
    if(!stack) continue;
    stack.innerHTML='';
    let cnt=board[i].count;
    let col=board[i].color;
    if(cnt>0){
      let show=Math.min(cnt,5);
      for(let j=0;j<show;j++){
        let d=document.createElement('div');
        d.className='checker '+col;
        if(isLocked(col)&&!isStartingPoint(i,col)&&j===0) d.classList.add('locked');
        if(i===selectedPoint&&j===show-1) d.classList.add('selected');
        if(cnt>5&&j===show-1){
          let sp=document.createElement('span');
          sp.className='checker-count';
          sp.textContent=cnt;
          d.appendChild(sp);
        }
        stack.appendChild(d);
      }
    }
  }
  // البار
  const barCell=document.getElementById('barCell');
  if(barCell){
    let html='';
    for(let i=0;i<Math.min(bar.white,3);i++) html+='<div class="bar-checker white"></div>';
    if(bar.white>0) html+=`<div class="bar-label">${bar.white}</div>`;
    for(let i=0;i<Math.min(bar.black,3);i++) html+='<div class="bar-checker black"></div>';
    if(bar.black>0) html+=`<div class="bar-label">${bar.black}</div>`;
    barCell.innerHTML=html;
  }
  // الصينية
  const boW=document.getElementById('boWhite');
  const boB=document.getElementById('boBlack');
  if(boW) boW.textContent=borneOff.white;
  if(boB) boB.textContent=borneOff.black;
  // الأقفال
  document.getElementById('whiteLock').style.display=whiteUnlocked?'none':'inline';
  document.getElementById('blackLock').style.display=blackUnlocked?'none':'inline';
  // النتيجة
  document.getElementById('whiteScore').textContent=scores.white;
  document.getElementById('blackScore').textContent=scores.black;
  // اللاعب النشط
  document.getElementById('whiteInfo').classList.toggle('active-turn',currentPlayer==='white');
  document.getElementById('blackInfo').classList.toggle('active-turn',currentPlayer==='black');
  // الزهر
  const d1=document.getElementById('die1');
  const d2=document.getElementById('die2');
  if(dice.length>=2){
    d1.textContent=dice[0];
    d2.textContent=dice[1];
    d1.classList.remove('rolling');
    d2.classList.remove('rolling');
    d1.classList.toggle('used',!movesLeft.includes(dice[0]));
    d2.classList.toggle('used',movesLeft.filter(v=>v===dice[1]).length < (dice[0]===dice[1]?movesLeft.length/2:1));
  }
  updateMovesLabel();
  clearHighlights();
  if(selectedPoint>=0) showValidDestinations(selectedPoint);
}

function updateMovesLabel(){
  const el=document.getElementById('movesLeftLabel');
  if(movesLeft.length>0){
    el.textContent='الحركات المتبقية: '+movesLeft.join(', ');
  } else {
    el.textContent='';
  }
}

function clearHighlights(){

    p.classList.remove('valid-dest','combined-dest');
  });

/* ===== حساب الحركات ===== */
function getValidDests(fromIdx){
  let player=currentPlayer;
  let dests=[];
  let uniqueDice=[...new Set(movesLeft)];
  // حركات فردية
  for(let d of uniqueDice){
    let dest=fromIdx+DIR[player]*d;
    if(dest>=0&&dest<24&&isValidDest(dest,player)){
      dests.push({to:dest,die:d,combined:false,diceUsed:[d]});
    }
    // إخراج
    if(canBearOff(player)){
      let dist=bearOffDist(player,fromIdx);
      if(dist===d||(dist<d&&isHighestChecker(player,fromIdx))){
        dests.push({to:'off',die:d,combined:false,diceUsed:[d]});
      }
    }
  }
  // حركة مجمعة
  if(movesLeft.length>=2){
    let cv=movesLeft[0]+movesLeft[1];
    let dest=fromIdx+DIR[player]*cv;
    if(dest>=0&&dest<24&&isValidDest(dest,player)){
      // لازم النقطة الوسطية تكون صالحة لأحد الترتيبين على الأقل
      let mid1=fromIdx+DIR[player]*movesLeft[0];
      let mid2=fromIdx+DIR[player]*movesLeft[1];
      let ok1=mid1>=0&&mid1<24&&isValidDest(mid1,player);
      let ok2=mid2>=0&&mid2<24&&isValidDest(mid2,player);
      if(ok1||ok2){
        dests.push({to:dest,die:cv,combined:true,diceUsed:[movesLeft[0],movesLeft[1]]});
      }
    }
    // إخراج مجمّع
    if(canBearOff(player)){
      let dist=bearOffDist(player,fromIdx);
      if(dist===cv||(dist<cv&&isHighestChecker(player,fromIdx))){
        dests.push({to:'off',die:cv,combined:true,diceUsed:[movesLeft[0],movesLeft[1]]});
      }
    }
  }
  return dests;
}

function isValidDest(idx,player){
  if(idx<0||idx>=24) return false;
  let pt=board[idx];
  if(pt.count===0||pt.color===null) return true;
  if(pt.color===player) return true;
  // مفيش أكل: حتى حجر واحد للخصم يمنع
  return false;
}

function hasAnyValidMove(){
  let player=currentPlayer;
  // لو فيه على البار
  if(bar[player]>0){
    let uniqueDice=[...new Set(movesLeft)];
    for(let d of uniqueDice){
      let dest=player==='white'? 24-d : d-1;
      if(dest>=0&&dest<24&&isValidDest(dest,player)) return true;
    }
    return false;
  }
  for(let i=0;i<24;i++){
    if(board[i].color!==player||board[i].count===0) continue;
    if(isLocked(player)&&!isStartingPoint(i,player)) continue;
    if(getValidDests(i).length>0) return true;
  }
  return false;
}

function showValidDestinations(fromIdx){
  let dests=getValidDests(fromIdx);
  for(let d of dests){
    if(d.to==='off') continue;
    let cell=document.querySelector(`.point-cell[data-idx="${d.to}"]`);
    if(cell){
      cell.classList.add(d.combined?'combined-dest':'valid-dest');
    }
  }
}

/* ===== النقر ===== */
function handlePointClick(idx){
  if(gameOver) return;
  if(gameMode==='computer'&&currentPlayer==='black') return;
  if(gameMode==='online-host'&&onlinePlayerColor==='black'&&currentPlayer==='white') return;
  if(gameMode==='online-host'&&onlinePlayerColor==='white'&&currentPlayer==='black') return;
  if(gameMode==='online-guest'&&onlinePlayerColor==='black'&&currentPlayer==='white') return;
  if(gameMode==='online-guest'&&onlinePlayerColor==='white'&&currentPlayer==='black') return;
  if(turnPhase!=='move') return;
  let player=currentPlayer;
  // لو فيه أحجار على البار لازم تدخلها الأول
  if(bar[player]>0){
    // النقر على نقطة لدخول حجر من البار
    let uniqueDice=[...new Set(movesLeft)];
    for(let d of uniqueDice){
      let dest=player==='white'? 24-d : d-1;
      if(dest===idx&&isValidDest(dest,player)){
        executeBarMove(dest,d);
        return;
      }
    }
    // حركة مجمعة من البار
    if(movesLeft.length>=2){
      let cv=movesLeft[0]+movesLeft[1];
      let dest=player==='white'? 24-cv : cv-1;
      if(dest===idx&&isValidDest(dest,player)){
        executeBarMove(dest,cv,true);
        return;
      }
    }
    showToast('لازم تدخل الحجر من البار الأول');
    return;
  }
  // اختيار حجر
  if(selectedPoint===-1){
    if(board[idx].color!==player||board[idx].count===0) return;
    if(isLocked(player)&&!isStartingPoint(idx,player)){
      showToast('الحجر مقفول! حرّك من نقطة البداية لحد ما حد يعدي البار');
      return;
    }
    if(getValidDests(idx).length===0){
      showToast('مفيش حركات متاحة من هنا');
      return;
    }
    selectedPoint=idx;
    renderBoard();
  } else if(selectedPoint===idx){
    selectedPoint=-1;
    renderBoard();
  } else {
    // محاولة الحركة
    let dests=getValidDests(selectedPoint);
    let match=dests.find(d=>d.to===idx);
    if(match){
      executeMove(selectedPoint,match);
    } else if(board[idx].color===player&&board[idx].count>0){
      // اختيار حجر تاني
      if(isLocked(player)&&!isStartingPoint(idx,player)){
        showToast('الحجر مقفول!');
        return;
      }
      selectedPoint=idx;
      renderBoard();
    }
  }
}

/* ===== تنفيذ الحركة ===== */
function executeMove(from,moveInfo){
  let player=currentPlayer;
  board[from].count--;
  if(board[from].count===0) board[from].color=null;
  if(moveInfo.to==='off'){
    borneOff[player]++;
  } else {
    board[moveInfo.to].color=player;
    board[moveInfo.to].count++;
  }
  // استهلاك الزهر
  for(let d of moveInfo.diceUsed){
    let idx=movesLeft.indexOf(d);
    if(idx!==-1) movesLeft.splice(idx,1);
  }
  selectedPoint=-1;
  checkUnlock(player);
  // هل كسب؟
  if(borneOff[player]===15){
    endGame(player);
    return;
  }
  renderBoard();
  // لو مفيش حركات متاحة خلص الدور
  if(movesLeft.length===0||!hasAnyValidMove()){
    setTimeout(()=>endTurn(),400);
  } else if(gameMode==='computer'&&currentPlayer==='black'){
    setTimeout(()=>aiMove(),600);
  }
  sendState();
}

function executeBarMove(dest,dieVal,combined=false){
  let player=currentPlayer;
  bar[player]--;
  board[dest].color=player;
  board[dest].count++;
  if(combined){
    let idx1=movesLeft.indexOf(movesLeft[0]);
    movesLeft.splice(idx1,1);
    let idx2=movesLeft.indexOf(movesLeft[0]);
    movesLeft.splice(idx2,1);
  } else {
    let idx=movesLeft.indexOf(dieVal);
    if(idx!==-1) movesLeft.splice(idx,1);
  }
  checkUnlock(player);
  if(borneOff[player]===15){endGame(player);return;}
  renderBoard();
  if(movesLeft.length===0||!hasAnyValidMove()){
    setTimeout(()=>endTurn(),400);
  } else if(gameMode==='computer'&&currentPlayer==='black'){
    setTimeout(()=>aiMove(),600);
  }
  sendState();
}

function checkUnlock(player){
  if(player==='white'&&!whiteUnlocked){
    for(let i=0;i<24;i++){
      if(board[i].color==='white'&&board[i].count>0&&isUnlockedZone(i)){
        whiteUnlocked=true;
        showToast('الأبيض فك القفل!');
        break;
      }
    }
  }
  if(player==='black'&&!blackUnlocked){
    for(let i=0;i<24;i++){
      if(board[i].color==='black'&&board[i].count>0&&isUnlockedZone(i)){
        blackUnlocked=true;
        showToast('الأسود فك القفل!');
        break;
      }
    }
  }
}

/* ===== رمي الزهر ===== */
function rollDiceForTurn(){
  if(turnPhase!=='roll') return;
  if(gameMode==='computer'&&currentPlayer==='black') return;
  let d1=Math.floor(Math.random()*6)+1;
  let d2=Math.floor(Math.random()*6)+1;
  dice=[d1,d2];
  if(d1===d2){
    movesLeft=[d1,d1,d1,d1];
  } else {
    movesLeft=[d1,d2];
  }
  turnPhase='move';
  document.getElementById('die1').textContent=d1;
  document.getElementById('die2').textContent=d2;
  document.getElementById('die1').classList.remove('used','rolling');
  document.getElementById('die2').classList.remove('used','rolling');
  document.getElementById('rollBtn').disabled=true;
  let pName=currentPlayer==='white'?'الأبيض':'الأسود';
  document.getElementById('turnLabel').textContent='دور '+pName;
  renderBoard();
  if(!hasAnyValidMove()){
    showToast('مفيش حركات متاحة!');
    setTimeout(()=>endTurn(),1000);
  } else if(gameMode==='computer'&&currentPlayer==='black'){
    setTimeout(()=>aiMove(),800);
  }
  sendState();
}

function endTurn(){
  movesLeft=[];
  dice=[];
  selectedPoint=-1;
  currentPlayer=currentPlayer==='white'?'black':'white';
  turnPhase='roll';
  document.getElementById('rollBtn').disabled=false;
  let pName=currentPlayer==='white'?'الأبيض':'الأسود';
  document.getElementById('turnLabel').textContent='دور '+pName;
  document.getElementById('die1').textContent='?';
  document.getElementById('die2').textContent='?';
  document.getElementById('die1').classList.remove('used');
  document.getElementById('die2').classList.remove('used');
  renderBoard();
  if(gameMode==='computer'&&currentPlayer==='black'){
    setTimeout(()=>rollDiceForTurn(),600);
  }
  sendState();
}

/* ===== الذكاء الاصطناعي ===== */
function aiMove(){
  if(gameOver||currentPlayer!=='black') return;
  let player='black';
  // لو فيه على البار
  if(bar[player]>0){
    let uniqueDice=[...new Set(movesLeft)];
    for(let d of uniqueDice){
      let dest=d-1;
      if(dest>=0&&dest<24&&isValidDest(dest,player)){
        executeBarMove(dest,d);
        return;
      }
    }
    if(movesLeft.length>=2){
      let cv=movesLeft[0]+movesLeft[1];
      let dest=cv-1;
      if(dest>=0&&dest<24&&isValidDest(dest,player)){
        executeBarMove(dest,cv,true);
        return;
      }
    }
    return;
  }
  // جمع كل الحركات المتاحة
  let allMoves=[];
  for(let i=0;i<24;i++){
    if(board[i].color!==player||board[i].count===0) continue;
    if(isLocked(player)&&!isStartingPoint(i,player)) continue;
    let dests=getValidDests(i);
    for(let d of dests){
      let score=evaluateAIMove(i,d);
      allMoves.push({from:i,...d,score});
    }
  }
  if(allMoves.length===0){
    if(movesLeft.length>0) movesLeft=[];
    setTimeout(()=>endTurn(),400);
    return;
  }
  allMoves.sort((a,b)=>b.score-a.score);
  let best=allMoves[0];
  executeMove(best.from,best);
}

function evaluateAIMove(from,moveInfo){
  let score=0;
  let player='black';
  // الإخراج أولوية عالية
  if(moveInfo.to==='off') score+=100;
  // فك القفل
  if(!blackUnlocked&&moveInfo.to!=='off'&&isUnlockedZone(moveInfo.to)) score+=80;
  // المسافة المقطوعة
  let dist=moveInfo.die;
  score+=dist*2;
  // التحرك من نقطة البداية
  if(isStartingPoint(from,player)) score+=10;
  // تجنب ترك نقطة بها حجر واحد (blot)
  if(board[from].count===2) score+=5; // هنسيب واحد
  // الوصول للمنزل
  if(moveInfo.to!=='off'&&moveInfo.to>=18) score+=15;
  // الحركة المجمعة أقل تفضيل (تستهلك زهرتين)
  if(moveInfo.combined) score-=5;
  return score;
}

/* ===== مودال البداية ===== */
let startRollW=0, startRollB=0, startWinner=null;

function rollForStart(){
  const btn=document.getElementById('rollStartBtn');
  const dW=document.getElementById('startDieW');
  const dB=document.getElementById('startDieB');
  const res=document.getElementById('rollResult');
  btn.disabled=true;
  dW.classList.add('rolling');
  dB.classList.add('rolling');
  dW.textContent='..';
  dB.textContent='..';
  res.textContent='';
  setTimeout(()=>{
    startRollW=Math.floor(Math.random()*6)+1;
    startRollB=Math.floor(Math.random()*6)+1;
    dW.textContent=startRollW;
    dB.textContent=startRollB;
    dW.classList.remove('rolling');
    dB.classList.remove('rolling');
    if(startRollW===startRollB){
      res.textContent='تعادل! ارمي تاني';
      btn.textContent='ارمي الزهر تاني';
      btn.disabled=false;
      btn.onclick=rollForStart;
    } else {
      startWinner=startRollW>startRollB?'white':'black';
      let wName=startWinner==='white'?'الأبيض':'الأسود';
      res.textContent=wName+' يبدأ!';
      btn.textContent='يلا نبدأ';
      btn.disabled=false;
      btn.onclick=confirmStart;
    }
  },600);
}

function confirmStart(){
  document.getElementById('rollModal').classList.remove('active');
  document.getElementById('gameScreen').classList.add('active');
  currentPlayer=startWinner;
  initBoard();
  buildBoard();
  renderBoard();
  let pName=currentPlayer==='white'?'الأبيض':'الأسود';
  document.getElementById('turnLabel').textContent='دور '+pName;
  document.getElementById('rollBtn').disabled=false;
  if(gameMode==='computer'&&currentPlayer==='black'){
    setTimeout(()=>rollDiceForTurn(),800);
  }
}

/* ===== بداية اللعبة ===== */
function startGame(mode){
  gameMode=mode;
  document.getElementById('mainMenu').classList.remove('active');
  document.getElementById('rollModal').classList.add('active');
  // إعادة تعيين المودال
  document.getElementById('startDieW').textContent='?';
  document.getElementById('startDieB').textContent='?';
  document.getElementById('rollResult').textContent='';
  const btn=document.getElementById('rollStartBtn');
  btn.textContent='ارمي الزهر';
  btn.disabled=false;
  btn.onclick=rollForStart;
  startWinner=null;
}

  isHost=false;
  onlinePlayerColor='black';
  peer=new Peer();
  peer.on('open',()=>{
    conn=peer.connect(code);
    conn.on('open
